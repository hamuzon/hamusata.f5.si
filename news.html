<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-lang="news_title">お知らせ / News – HAMUSATA</title>
  <link rel="icon" href="https://hamusata.f5.si/favicon.ico">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/mobile-menu.css">
  <link rel="stylesheet" href="css/dark.css" media="(prefers-color-scheme: dark)" />
  <link rel="stylesheet" href="css/light.css" media="(prefers-color-scheme: light)" />
  <script>
    (function () {
      var tp = new URLSearchParams(window.location.search).get('theme');
      var theme = (tp === 'dark' || tp === 'light') ? tp : (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.className = theme;
    })();
  </script>
  <style>
    main { max-width: 800px; margin: 0 auto; padding: 2rem 1.5rem; text-align: left; }
    .news-list { list-style: none; padding: 0; }
    .news-item { 
      margin-bottom: 2rem; 
      padding: 1.5rem; 
      border-radius: 16px; 
      background: rgba(255,255,255,0.05); 
      -webkit-backdrop-filter: blur(10px);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1);
    }
    .news-date { font-size: 0.9rem; opacity: 0.7; display: block; margin-bottom: 0.5rem; }
    .news-tag { 
      display: inline-block; padding: 2px 10px; border-radius: 6px; 
      font-size: 0.7rem; background: #00bcd4; color: #fff; margin-right: 10px; 
      vertical-align: middle;
      text-transform: uppercase;
    }
    h1 { margin-bottom: 2rem; }
    #lang-switch { position: fixed; top: 16px; left: 16px; padding: 0.5rem 1rem; border-radius: 12px; cursor: pointer; z-index: 1001; }
    .back-home { display: block; text-align: center; margin-top: 3rem; color: #00bcd4; text-decoration: none; font-weight: bold; }
  </style>
</head>
<body>
  <button id="lang-switch" aria-label="Language switch">🌐 English</button>
  <header>
    <a href="index.html" class="banner-link">
      <img src="hamusata_399-120.webp" alt="home" width="399" height="120" loading="eager">
    </a>
  </header>
  <main>
    <h1 data-lang="news_h1">お知らせ</h1>
    <div class="news-list" id="news-list-container">
      <p>読み込み中...</p>
    </div>
    <a href="index.html" class="back-home" data-lang="back_home">← ホームページへ戻る</a>
  </main>
  <footer>
    &copy; <span id="year"></span> @hamuzon / @hamusata
  </footer>
  <script src="js/script.js" defer></script>
  <script src="js/lang-switch.js" defer></script>
  <script src="js/news.js" defer></script>
</body>
</html>
